    <script>
    // *** 請在這裡設定貴校的 Google Workspace 網域名稱 ***
    const SCHOOL_DOMAIN = "bhnkc.edu.hk"; 

    function decodeJwtResponse(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch (e) {
            return null;
        }
    }

    const id_token = window.sessionStorage.getItem('google_id_token');
    let is_authenticated = true;

    if (id_token) {
        const payload = decodeJwtResponse(id_token);
        if (payload && payload.hd === SCHOOL_DOMAIN && payload.exp && (payload.exp * 1000) > Date.now()) {
            is_authenticated = true;
        }
    }

    if (!is_authenticated) {
        window.top.location.href = 'index.html';
    }
    </script>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const loadingDiv = document.getElementById('loading');
        const listAllButton = document.getElementById('listAllButton');
        const searchResultsDiv = document.getElementById('searchResults');
        
        const tabQuery = document.getElementById('tabQuery');
        const tabListAll = document.getElementById('tabListAll');
        const panelQuery = document.getElementById('panelQuery');
        const panelListAll = document.getElementById('panelListAll');

        // 中六雙向同步核取方塊
        const f6EndedCheckbox = document.getElementById('f6EndedCheckbox');
        const f6EndedCheckboxList = document.getElementById('f6EndedCheckboxList');

        // 模式一 DOM
        const daySelect = document.getElementById('daySelect');
        const multiTeacherInput = document.getElementById('multiTeacherInput');
        const clearMultiBtn = document.getElementById('clearMultiBtn');
        const periodCheckboxGroup = document.getElementById('periodCheckboxGroup');
        const selectAllPeriodsBtn = document.getElementById('selectAllPeriodsBtn');
        const clearAllPeriodsBtn = document.getElementById('clearAllPeriodsBtn');
        
        // 模式二 DOM
        const filterWrapper = document.getElementById('filterWrapper');
        const teacherLikeInput = document.getElementById('teacherLikeInput');
        const clearLikeBtn = document.getElementById('clearLikeBtn');
        
        let allLessons = [];    
        let allTeachers = [];   
        let currentActiveTab = "query"; 
        const dayNames = ["", "星期一", "星期二", "星期三", "星期四", "星期五"];

        // 自動同步兩個中六核取方塊的狀態
        function syncF6State(sourceChecked) {
            f6EndedCheckbox.checked = sourceChecked;
            f6EndedCheckboxList.checked = sourceChecked;
            if (currentActiveTab === "query") {
                executePeriodQuery();
            } else if (currentActiveTab === "listAll" && !filterWrapper.classList.contains('hidden')) {
                renderListAllTable(teacherLikeInput.value);
            }
        }
        f6EndedCheckbox.addEventListener('change', function() { syncF6State(this.checked); });
        f6EndedCheckboxList.addEventListener('change', function() { syncF6State(this.checked); });

        // 自動偵測今日星期
        function initDefaultDayToCurrent() {
            const currentDay = new Date().getDay(); 
            if (currentDay >= 1 && currentDay <= 5) {
                daySelect.value = String(currentDay);
            } else {
                daySelect.value = "1";
            }
        }
        initDefaultDayToCurrent();

        // 頁籤切換
        tabQuery.addEventListener('click', () => {
            currentActiveTab = "query";
            tabQuery.classList.add('active');
            tabListAll.classList.remove('active');
            panelQuery.classList.remove('hidden');
            panelListAll.classList.add('hidden');
            searchResultsDiv.innerHTML = '';
            filterWrapper.classList.add('hidden');
            teacherLikeInput.value = '';
            handleWednesdayPeriodVisibility(); 
            executePeriodQuery();
        });

        tabListAll.addEventListener('click', () => {
            currentActiveTab = "listAll";
            tabListAll.classList.add('active');
            tabQuery.classList.remove('active');
            panelListAll.classList.remove('hidden');
            panelQuery.classList.add('hidden');
            searchResultsDiv.innerHTML = '';
        });

        // Google Sheet 引擎
        window.handleGoogleSheetResponse = function(jsonData) {
            try {
                if (!jsonData || !jsonData.table || !jsonData.table.rows) {
                    throw new Error("試算表格式不正確！");
                }
                
                const rows = jsonData.table.rows;
                allLessons = [];
                
                rows.forEach(row => {
                    const c = row.c;
                    if (c && c.length >= 7) {
                        const teacherName = c[3] ? String(c[3].v).trim() : '';
                        const className = c[4] ? String(c[4].v).trim() : ''; 
                        if (teacherName) {
                            allLessons.push({
                                day:     c[1] ? parseInt(c[1].v) : 0,
                                period:  c[2] ? parseInt(c[2].v) : 0,
                                teacher: teacherName,
                                class:   className 
                            });
                        }
                    }
                });

                allTeachers = [...new Set(allLessons.map(item => item.teacher))].sort();
                loadingDiv.innerHTML = '<span style="color:green; font-weight:bold;">✓ 成功從雲端同步最新課表數據庫</span>';
                listAllButton.disabled = false;
                
                for(let i=1; i<=10; i++) {
                    document.getElementById(`p${i}`).checked = true;
                }
                
                handleWednesdayPeriodVisibility(); 
                executePeriodQuery();
                
            } catch (error) {
                console.error('資料解析錯誤:', error);
                loadingDiv.innerHTML = `<span style="color:red; font-weight:bold;">✗ 數據同步失敗: ${error.message}</span>`;
            }
        };

        function loadGoogleSheetData() {
            const sheetId = '10TdramDTMZLQxl-jShrZeYJLCTtq0iu98PVPb-sZXyU';
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:handleGoogleSheetResponse&t=`;
            
            const script = document.createElement('script');
            script.src = url + Date.now(); 
            script.onerror = function() {
                loadingDiv.innerHTML = `<span style="orange;">⚠️ 連線失敗，正在重試...</span>`;
                setTimeout(loadGoogleSheetData, 2000);
            };
            document.head.appendChild(script);
        }

        // 星期三第10節隱藏
        function handleWednesdayPeriodVisibility() {
            const targetDay = parseInt(daySelect.value);
            const p10Wrapper = document.getElementById('p10Wrapper');
            const p10Checkbox = document.getElementById('p10');

            if (targetDay === 3) {
                if (p10Wrapper) p10Wrapper.classList.add('hidden');
                if (p10Checkbox) p10Checkbox.checked = false;
            } else {
                if (p10Wrapper) p10Wrapper.classList.remove('hidden');
            }
        }

        // 功能一：特定時段篩選計算
        function executePeriodQuery() {
            if (currentActiveTab !== "query") return;

            const targetDay = parseInt(daySelect.value);
            const isF6Ended = f6EndedCheckbox.checked; 
            
            const maxPeriod = (targetDay === 3) ? 9 : 10;
            const selectedPeriods = [];
            for (let i = 1; i <= maxPeriod; i++) {
                if (document.getElementById(`p${i}`).checked) selectedPeriods.push(i);
            }

            if (selectedPeriods.length === 0) {
                searchResultsDiv.innerHTML = `<div style="padding:10px; background:#e2e8f0; color:#475569; border-radius:4px; font-size:14px;">請勾選上方需要查詢的節數。</div>`;
                return;
            }

            const operator = document.querySelector('input[name="period-operator"]:checked').value;
            const rawInput = multiTeacherInput.value;
            const teacherKeywords = rawInput
                .replace(/，/g, ',') 
                .split(/[\s,]+/)    
                .map(k => k.trim().toUpperCase())
                .filter(k => k.length > 0);

            const freeTeachersResult = [];

            allTeachers.forEach(teacher => {
                const teacherUpper = teacher.toUpperCase();
                if (teacherKeywords.length > 0) {
                    const matchesAnyKeyword = teacherKeywords.some(keyword => teacherUpper.startsWith(keyword));
                    if (!matchesAnyKeyword) return; 
                }

                const statusMap = {};        
                const isF6ReleasedMap = {};  

                selectedPeriods.forEach(p => {
                    const matchingLessons = allLessons.filter(l => l.teacher === teacher && l.day === targetDay && l.period === p);
                    
                    if (matchingLessons.length === 0) {
                        statusMap[p] = true;
                        isF6ReleasedMap[p] = false;
                    } else {
                        const allLessonsAreF6 = matchingLessons.every(l => l.class && l.class.includes('6'));
                        if (isF6Ended && allLessonsAreF6) {
                            statusMap[p] = true;
                            isF6ReleasedMap[p] = true;
                        } else {
                            statusMap[p] = false;
                            isF6ReleasedMap[p] = false;
                        }
                    }
                });

                const totalSelected = selectedPeriods.length;
                const freeCount = selectedPeriods.filter(p => statusMap[p] === true).length;
                let isMatch = (operator === 'or') ? (freeCount > 0) : (freeCount === totalSelected);

                if (isMatch) {
                    // 精簡優化項目：文字縮短為純橙色「中六」，字體縮小
                    const periodDisplayStrings = selectedPeriods
                        .filter(p => statusMap[p] === true)
                        .map(p => {
                            if (isF6ReleasedMap[p]) {
                                return `第 ${p} 節<span class="f6-mini-tag">中六</span>`;
                            }
                            return `第 ${p} 節`;
                        });

                    freeTeachersResult.push({
                        name: teacher,
                        displayPeriods: periodDisplayStrings
                    });
                }
            });

            if (freeTeachersResult.length === 0) {
                searchResultsDiv.innerHTML = `<div style="padding:12px; background:#fff3cd; color:#856404; border-radius:4px; font-size:14px;">找不到符合條件的教師。</div>`;
                return;
            }

            let html = `
                <div style="margin-bottom:8px; font-weight:bold; color:#2c3e50; font-size:14px;">🔍 符合條件的空堂教師 (共 ${freeTeachersResult.length} 位)：</div>
                <table class="results-table">
                    <thead>
                        <tr>
                            <th style="width: 25%;">教師姓名</th>
                            <th style="width: 15%;">狀態</th>
                            <th>具體空堂時段</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            freeTeachersResult.forEach(item => {
                html += `
                    <tr>
                        <td><strong>${item.name}</strong></td>
                        <td><span class="status-tag">FREE 空堂</span></td>
                        <td><span style="color: #2980b9; font-weight: 500; display:flex; gap:10px; flex-wrap:wrap;">${item.displayPeriods.join(', ')}</span></td>
                    </tr>
                `;
            });
            html += `</tbody></table>`;
            searchResultsDiv.innerHTML = html;
        }

        // 按鈕事件
        selectAllPeriodsBtn.addEventListener('click', function() {
            const targetDay = parseInt(daySelect.value);
            const maxPeriod = (targetDay === 3) ? 9 : 10;
            for (let i = 1; i <= 10; i++) {
                document.getElementById(`p${i}`).checked = (i <= maxPeriod);
            }
            executePeriodQuery(); 
        });

        clearAllPeriodsBtn.addEventListener('click', function() {
            for (let i = 1; i <= 10; i++) {
                document.getElementById(`p${i}`).checked = false;
            }
            executePeriodQuery(); 
        });

        daySelect.addEventListener('change', function() {
            handleWednesdayPeriodVisibility();
            executePeriodQuery();
        });

        multiTeacherInput.addEventListener('input', executePeriodQuery);
        periodCheckboxGroup.addEventListener('change', executePeriodQuery);
        document.querySelectorAll('input[name="period-operator"]').forEach(radio => {
            radio.addEventListener('change', executePeriodQuery);
        });

        clearMultiBtn.addEventListener('click', function() {
            multiTeacherInput.value = '';
            executePeriodQuery();
            multiTeacherInput.focus();
        });

        // 功能二：總表核心
        listAllButton.addEventListener('click', function() {
            teacherLikeInput.value = ''; 
            filterWrapper.classList.remove('hidden'); 
            renderListAllTable(""); 
        });

        function renderListAllTable(keyword) {
            const cleanKeyword = keyword.trim().toUpperCase();
            const isF6Ended = f6EndedCheckbox.checked; 

            const filteredTeachers = allTeachers.filter(teacher => 
                teacher.toUpperCase().startsWith(cleanKeyword)
            );

            if (filteredTeachers.length === 0) {
                searchResultsDiv.innerHTML = `<div style="padding:10px; background:#fff3cd; color:#856404; border-radius:4px; margin-top:10px; font-size:14px;">找不到教師。</div>`;
                return;
            }

            let html = `
                <div style="margin-bottom:8px; font-weight:bold; color:#2c3e50; margin-top: 10px; font-size:14px;">
                    📊 全校教師每日空堂對照總表 (共 ${filteredTeachers.length} 位)
                </div>
                <div style="overflow-x: auto;">
                <table class="results-table" style="font-size: 13px; text-align: center;">
                    <thead>
                        <tr>
                            <th style="text-align: left; min-width: 90px;">教師姓名</th>
                            <th>星期</th>
                            <th>第1節</th><th>第2節</th><th>第3節</th><th>第4節</th><th>第5節</th>
                            <th>第6節</th><th>第7節</th><th>第8節</th><th>第9節</th><th>第10節</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            filteredTeachers.forEach(teacher => {
                for (let day = 1; day <= 5; day++) {
                    if (day === 1) {
                        html += `<tr><td rowspan="5" style="text-align: left; vertical-align: middle; background: #ffffff; border-right: 2px solid #cbd5e1;"><strong>${teacher}</strong></td>`;
                    } else {
                        html += `<tr>`;
                    }
                    
                    html += `<td style="background: #f1f5f9; font-weight: bold;">${dayNames[day].replace("星期", "周")}</td>`;
                    
                    for (let p = 1; p <= 10; p++) {
                        if (day === 3 && p === 10) {
                            html += `<td><span class="busy-block">-</span></td>`;
                            continue;
                        }

                        const matchingLessons = allLessons.filter(l => l.teacher === teacher && l.day === day && l.period === p);
                        
                        if (matchingLessons.length === 0) {
                            html += `<td><span class="free-block">O</span></td>`; 
                        } else {
                            const allLessonsAreF6 = matchingLessons.every(l => l.class && l.class.includes('6'));
                            if (isF6Ended && allLessonsAreF6) {
                                html += `<td><span class="f6-free-block">6</span></td>`;
                            } else {
                                html += `<td><span class="busy-block">-</span></td>`; 
                            }
                        }
                    }
                    html += `</tr>`;
                }
            });

            html += `</tbody></table></div>`;
            searchResultsDiv.innerHTML = html;
        }

        teacherLikeInput.addEventListener('input', function() {
            renderListAllTable(this.value);
        });

        clearLikeBtn.addEventListener('click', function() {
            teacherLikeInput.value = '';
            renderListAllTable("");
            teacherLikeInput.focus();
        });

        loadGoogleSheetData();
    });
    </script>
</body>
</html>
