<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三年又三年調位抽籤系統 (雲端連動版)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --name-size: 16px;
    }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInFromBottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInFromRight { from { transform: translateX(2rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-up { animation: slideInFromBottom 0.3s ease-out forwards; }
    .animate-slide-right { animation: slideInFromRight 0.3s ease-out forwards; }
    .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans p-1 md:p-2 h-screen overflow-hidden flex flex-col">

  <div id="main-app-container" class="w-full h-full mx-auto bg-white rounded-xl shadow-xl flex flex-col overflow-hidden border border-slate-200 transition-all duration-300">
    
    <div id="main-header" class="bg-gradient-to-r from-indigo-600 to-blue-500 p-2 md:p-3 text-white flex justify-between items-center shrink-0">
      <div class="flex items-center gap-2">
        <i data-lucide="users" class="w-5 h-5 hidden sm:block"></i>
        <h1 class="text-lg md:text-xl font-bold leading-none">三年又三年調位抽籤系統</h1>
        <span id="header-subtitle" class="hidden md:inline text-xs text-indigo-100 ml-2 border-l border-indigo-400 pl-2">version 33 </span>
      </div>
      <div class="flex items-center gap-2">
        <button id="btn-fullscreen" class="flex items-center gap-1.5 px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded-full transition-colors backdrop-blur-sm text-xs font-medium" title="切換全螢幕">
          <i data-lucide="maximize" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">全螢幕</span>
        </button>
        <button id="btn-redraw" class="hidden items-center gap-1.5 px-3 py-1.5 bg-amber-500 hover:bg-amber-400 text-white rounded-full transition-colors shadow-sm text-xs font-bold">
          <i data-lucide="shuffle" class="w-3.5 h-3.5"></i> 重新抽籤
        </button>
        <button id="btn-reset" class="hidden items-center gap-1.5 px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded-full transition-colors backdrop-blur-sm text-xs font-medium">
          <i data-lucide="settings" class="w-3.5 h-3.5"></i> 重新設定
        </button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto bg-slate-50 relative flex flex-col">
      
      <div id="section-settings" class="p-4 md:p-6 space-y-5 max-w-4xl mx-auto w-full animate-slide-up">
        
        <div class="flex flex-col md:flex-row p-1 bg-white border border-slate-200 rounded-xl w-full gap-1 shadow-sm flex-wrap">
          <button data-mode="all" class="mode-btn flex-1 py-2.5 px-2 rounded-lg flex items-center justify-center gap-2 text-sm font-bold transition-all bg-indigo-50 text-indigo-600 shadow-sm border border-indigo-100 min-w-[120px]">
            <i data-lucide="users" class="w-4 h-4"></i> 模式一：全部抽籤
          </button>
          <button data-mode="split" class="mode-btn flex-1 py-2.5 px-2 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-50 border border-transparent min-w-[120px]">
            <i data-lucide="layers" class="w-4 h-4"></i> 模式二：優先填滿
          </button>
          <button data-mode="mode3" class="mode-btn flex-1 py-2.5 px-2 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-50 border border-transparent min-w-[120px]">
            <i data-lucide="table" class="w-4 h-4"></i> 模式三：列表分配
          </button>
          <button data-mode="mode4" class="mode-btn flex-1 py-2.5 px-2 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-50 border border-transparent min-w-[120px]">
            <i data-lucide="dice-5" class="w-4 h-4"></i> 模式四：分層分派
          </button>
          <button data-mode="mode5" class="mode-btn flex-1 py-2.5 px-2 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-50 border border-transparent min-w-[120px]">
            <i data-lucide="home" class="w-4 h-4"></i> 模式五：三房分派
          </button>
        </div>

        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
          <label class="block text-sm font-bold text-slate-700 flex items-center gap-1.5">
            <i data-lucide="cloud" class="w-4 h-4 text-indigo-500"></i> 從 Google 試算表載入名單 (JSONP 連動)
          </label>
          <div class="flex gap-2">
            <input type="text" id="sheet-url-input" class="flex-1 px-3 py-2 text-sm rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="請貼上 Google 試算表的共用網址，或直接輸入試算表 ID (留空使用預設名單)" />
            <button id="btn-load-sheet" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold text-sm transition-colors shadow-sm shrink-0 flex items-center gap-1">
              <i data-lucide="cloud-download" class="w-4 h-4"></i> 載入雲端名單
            </button>
          </div>
          <p class="text-xs text-slate-400 leading-relaxed">
            💡 提示：試算表必須將共用權限設定為<strong>「知道連結的任何人都可以檢視」</strong>。<br>
            欄位格式對應：<strong>A欄:</strong> 姓名 | <strong>B欄:</strong> 連票號碼 (相同號碼者視為同組連票，將會一起中籤並連著顯示) | <strong>C欄:</strong> 指定樓層/房間 (0=無, 1=下層或1號房, 2=上層或2號房, 3=3號房) | <strong>D欄:</strong> 組別/科別 (0代表獨立人仕)
          </p>
        </div>

        <div class="opacity-60 hover:opacity-100 transition-opacity">
          <label class="block w-full cursor-pointer group bg-white">
            <div class="border-2 border-dashed border-slate-300 group-hover:border-indigo-400 group-hover:bg-indigo-50/30 rounded-2xl p-4 text-center transition-all">
              <i data-lucide="upload" class="w-6 h-6 text-slate-400 group-hover:text-indigo-500 mx-auto mb-1 transition-colors"></i>
              <span class="block text-slate-600 font-bold text-xs">或者：點擊選擇或拖曳 TXT 本地檔案匯入</span>
              <span class="block text-slate-400 text-[11px] mt-0.5">格式：姓名,連票號碼,指定樓層/房間,組別 (如：陳大文,101,0,資訊科)</span>
              <span id="file-name-display" class="hidden mt-2 inline-block px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs font-bold"></span>
            </div>
            <input type="file" id="file-upload" accept=".txt" class="hidden" />
          </label>
        </div>

        <div id="layer-settings" class="hidden bg-white p-4 rounded-xl border border-slate-200 flex gap-4 shadow-sm animate-zoom-in flex-wrap md:flex-nowrap">
          <div class="flex-1 min-w-[120px]">
            <label id="lbl-lower-count" class="block text-xs font-bold text-slate-600 mb-1">1號教員室人數 (自動)</label>
            <input type="number" id="lower-count" readonly class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 bg-slate-50 text-slate-500 outline-none cursor-not-allowed transition-all" placeholder="輸入人數" />
          </div>
          <div class="flex-1 min-w-[120px]">
            <label id="lbl-upper-count" class="block text-xs font-bold text-slate-600 mb-1">2號教員室人數</label>
            <input type="number" id="upper-count" min="0" class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="輸入人數" />
          </div>
          <div id="room3-container" class="flex-1 min-w-[120px] hidden">
            <label id="lbl-room3-count" class="block text-xs font-bold text-slate-600 mb-1">3號教員室人數</label>
            <input type="number" id="room3-count" min="0" class="w-full px-3 py-2 text-sm rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" placeholder="輸入人數" />
          </div>
        </div>

        <div id="chk-container" class="hidden bg-white p-3 md:p-4 rounded-xl border border-slate-200 flex items-center gap-3 shadow-sm animate-zoom-in mt-2">
          <input type="checkbox" checked id="chk-separate-draw" class="w-5 h-5 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500 cursor-pointer">
          <label for="chk-separate-draw" class="flex flex-col cursor-pointer select-none">
            <span class="text-sm font-bold text-slate-700">同科同層，分開中籤</span>
            <span class="text-xs text-slate-500 mt-0.5">打勾後：確保同科分配在同層，但各科成員中籤次序獨立洗牌（注意：B欄同號連票依然會保持絕對綑綁連位顯示）</span>
          </label>
        </div>

        <div class="text-center pt-2">
          <button id="btn-start" disabled class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-bold text-base hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-200 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 mx-auto w-full max-w-xs shadow-md">
            <i data-lucide="play" class="w-4 h-4" fill="currentColor"></i> <span id="start-btn-text">開始系統抽籤</span>
          </button>
        </div>
      </div>

      <div id="section-drawing" class="hidden flex-col h-full animate-slide-right">
        
        <div class="bg-white px-2 py-1.5 md:px-4 md:py-2 border-b border-slate-200 flex flex-wrap justify-between items-center gap-2 shrink-0 shadow-sm z-10">
          
          <div id="draw-progress" class="flex items-center gap-2">
            <span class="text-xs font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded-md" title="此為進度">
              <span id="draw-progress-label">座位數目</span> <span id="draw-index-display" class="text-indigo-600 text-sm">0</span> / <span id="draw-total-display">0</span>
            </span>
            <div id="layer-balances" class="hidden items-center gap-1.5"></div>
          </div>

          <div id="draw-action-area" class="flex items-center gap-2 flex-1 justify-center min-w-max">
            </div>

          <div class="flex items-center gap-1.5 flex-wrap justify-end">
            <select id="sel-layout-mode" class="px-2 py-1.5 bg-white border border-slate-200 rounded text-[11px] font-bold text-slate-600 outline-none cursor-pointer hover:bg-slate-50 transition-colors shadow-sm mr-1">
              <option value="horizontal" selected>直向顯示</option>
              <option value="vertical">橫向顯示</option>
            </select>

            <label class="flex items-center gap-1 px-2 py-1.5 bg-white border border-slate-200 rounded text-[11px] font-bold text-slate-600 cursor-pointer hover:bg-slate-50 transition-colors shadow-sm mr-1">
              <input type="checkbox" id="chk-show-designated" class="rounded text-indigo-600 border-slate-300 focus:ring-indigo-500 w-3 h-3" checked>
              <span class="hidden sm:inline">顯示</span>指定參數
            </label>

            <div class="flex items-center border border-slate-200 rounded bg-slate-50 mr-1">
              <button id="btn-font-minus" class="px-2 py-1 hover:bg-slate-200 text-slate-600 transition-colors font-bold text-xs rounded-l shadow-sm active:scale-95" title="縮小字體">A-</button>
              <div class="w-px h-3 bg-slate-300"></div>
              <button id="btn-font-plus" class="px-2 py-1 hover:bg-slate-200 text-slate-600 transition-colors font-bold text-sm rounded-r shadow-sm active:scale-95" title="放大字體">A+</button>
            </div>

            <button id="btn-export-xlsx" class="flex items-center gap-1 px-2 py-1 bg-green-50 text-green-700 hover:bg-green-100 rounded border border-green-200 text-[11px] font-bold transition-colors">
              <i data-lucide="download" class="w-3 h-3"></i> XLSX
            </button>
            <button id="btn-export-pdf" class="flex items-center gap-1 px-2 py-1 bg-rose-50 text-rose-700 hover:bg-rose-100 rounded border border-rose-200 text-[11px] font-bold transition-colors">
              <i data-lucide="download" class="w-3 h-3"></i> PDF
            </button>
          </div>
        </div>

        <div class="flex-1 overflow-y-auto p-2 md:p-3 bg-slate-50/50" id="pdf-container">
          <div id="pdf-header" class="hidden print:block text-center mb-4 text-xl font-bold text-slate-800 border-b pb-2">
            抽籤結果報告
          </div>
          <div id="results-content" class="h-full">
            </div>
        </div>

      </div>

    </div>
  </div>

  <div id="custom-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 backdrop-blur-sm transition-opacity">
    <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4 transform transition-all animate-zoom-in border border-slate-100 flex flex-col items-center">
      <div id="modal-icon-container" class="mb-3"></div>
      <h3 id="modal-title" class="text-xl font-bold text-slate-800 text-center mb-2">系統提示</h3>
      <p id="modal-message" class="text-slate-600 text-center mb-6 text-sm whitespace-pre-line leading-relaxed"></p>
      <div id="modal-buttons" class="flex justify-center gap-3 w-full"></div>
    </div>
  </div>

  <script>
    // --- Application State ---
    const state = {
      mode: 'all', 
      rawNames: [],
      groups: [], 
      drawList: [], 
      drawIndex: 0, 
      drawStepTotal: 0,
      isStarted: false,
      fileName: '',
      upperCount: '',
      lowerCount: '',
      room3Count: '',
      fontSize: 16,
      isCssMaximized: false,
      layoutMode: 'horizontal'
    };

    // --- DOM Elements ---
    const els = {
      mainAppContainer: document.getElementById('main-app-container'),
      btnReset: document.getElementById('btn-reset'),
      btnRedraw: document.getElementById('btn-redraw'),
      btnFullscreen: document.getElementById('btn-fullscreen'),
      btnFontMinus: document.getElementById('btn-font-minus'),
      btnFontPlus: document.getElementById('btn-font-plus'),
      chkSeparateDraw: document.getElementById('chk-separate-draw'),
      chkShowDesignated: document.getElementById('chk-show-designated'),
      selLayoutMode: document.getElementById('sel-layout-mode'),
      chkContainer: document.getElementById('chk-container'),
      sectionSettings: document.getElementById('section-settings'),
      sectionDrawing: document.getElementById('section-drawing'),
      modeBtns: document.querySelectorAll('.mode-btn'),
      fileUpload: document.getElementById('file-upload'),
      fileNameDisplay: document.getElementById('file-name-display'),
      sheetUrlInput: document.getElementById('sheet-url-input'),
      btnLoadSheet: document.getElementById('btn-load-sheet'),
      layerSettings: document.getElementById('layer-settings'),
      lblUpperCount: document.getElementById('lbl-upper-count'),
      lblLowerCount: document.getElementById('lbl-lower-count'),
      lblRoom3Count: document.getElementById('lbl-room3-count'),
      upperCount: document.getElementById('upper-count'),
      lowerCount: document.getElementById('lower-count'),
      room3Count: document.getElementById('room3-count'),
      room3Container: document.getElementById('room3-container'),
      btnStart: document.getElementById('btn-start'),
      startBtnText: document.getElementById('start-btn-text'),
      drawProgress: document.getElementById('draw-progress'),
      drawProgressLabel: document.getElementById('draw-progress-label'),
      drawIndexDisplay: document.getElementById('draw-index-display'),
      drawTotalDisplay: document.getElementById('draw-total-display'),
      layerBalances: document.getElementById('layer-balances'),
      drawActionArea: document.getElementById('draw-action-area'),
      resultsContent: document.getElementById('results-content'),
      pdfHeader: document.getElementById('pdf-header'),
      btnExportXlsx: document.getElementById('btn-export-xlsx'),
      btnExportPdf: document.getElementById('btn-export-pdf'),
      pdfContainer: document.getElementById('pdf-container'),
      headerSubtitle: document.getElementById('header-subtitle')
    };

    // --- Custom Modal Controller ---
    const CustomModal = {
      el: document.getElementById('custom-modal'),
      titleEl: document.getElementById('modal-title'),
      msgEl: document.getElementById('modal-message'),
      iconContainer: document.getElementById('modal-icon-container'),
      btnContainer: document.getElementById('modal-buttons'),
      
      show(type, title, message, onConfirmCallback) {
        this.titleEl.textContent = title;
        this.msgEl.textContent = message;
        
        if (type === 'alert') {
          this.iconContainer.innerHTML = '<i data-lucide="info" class="w-12 h-12 text-indigo-500"></i>';
          this.btnContainer.innerHTML = `<button id="modal-btn-ok" class="w-full px-6 py-2.5 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors shadow-sm">確定</button>`;
          lucide.createIcons({ root: this.iconContainer });
          document.getElementById('modal-btn-ok').onclick = () => this.hide();
        } else if (type === 'confirm') {
          this.iconContainer.innerHTML = '<i data-lucide="alert-triangle" class="w-12 h-12 text-amber-500"></i>';
          this.btnContainer.innerHTML = `
            <button id="modal-btn-cancel" class="flex-1 px-4 py-2.5 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-colors">取消</button>
            <button id="modal-btn-confirm" class="flex-1 px-4 py-2.5 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 transition-colors shadow-sm">確定執行</button>
          `;
          lucide.createIcons({ root: this.iconContainer });
          document.getElementById('modal-btn-cancel').onclick = () => this.hide();
          document.getElementById('modal-btn-confirm').onclick = () => {
            this.hide();
            if (onConfirmCallback) onConfirmCallback();
          };
        }
        
        this.el.classList.remove('hidden');
      },
      hide() { this.el.classList.add('hidden'); },
      alert(message) { this.show('alert', '系統提示', message); },
      confirm(message, onConfirmCallback) { this.show('confirm', '⚠️ 警告', message, onConfirmCallback); }
    };

    // --- Initialize ---
    lucide.createIcons();
    bindEvents();

    function bindEvents() {
      els.modeBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
          setMode(e.currentTarget.dataset.mode);
        });
      });

      els.fileUpload.addEventListener('change', handleFileUpload);
      els.btnLoadSheet.addEventListener('click', handleLoadSheet);
      els.upperCount.addEventListener('input', handleUpperCountChange);
      
      els.lowerCount.addEventListener('input', (e) => {
          if (state.mode === 'mode4' || state.mode === 'mode5') state.lowerCount = e.target.value;
      });

      els.room3Count.addEventListener('input', (e) => {
          if (state.mode === 'mode5') state.room3Count = e.target.value;
      });

      els.btnStart.addEventListener('click', startDraw);
      els.btnReset.addEventListener('click', confirmReset);
      els.btnRedraw.addEventListener('click', redraw);
      els.btnFullscreen.addEventListener('click', toggleFullscreen);
      els.btnFontMinus.addEventListener('click', () => adjustFontSize(-2));
      els.btnFontPlus.addEventListener('click', () => adjustFontSize(2));
      els.btnExportXlsx.addEventListener('click', exportXLSX);
      els.btnExportPdf.addEventListener('click', exportPDF);
      els.chkShowDesignated.addEventListener('change', renderDrawingUI);
      els.selLayoutMode.addEventListener('change', (e) => {
        state.layoutMode = e.target.value;
        renderDrawingUI();
      });
      
      document.addEventListener('keydown', handleKeyDown);
      document.addEventListener('fullscreenchange', updateFullscreenButton);
    }

    // --- Logic Functions ---

    function toggleFullscreen() {
      if (!document.fullscreenElement && !state.isCssMaximized) {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(err => {
            applyCssMaximize();
            CustomModal.alert("由於安全限制，無法啟動原生全螢幕。\n系統已自動為您切換至「視窗最大化」模式。");
          });
        } else {
          applyCssMaximize();
        }
      } else {
        if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen();
        if (state.isCssMaximized) removeCssMaximize();
      }
    }

    function applyCssMaximize() {
      state.isCssMaximized = true;
      els.mainAppContainer.classList.remove('rounded-xl', 'border', 'border-slate-200', 'shadow-xl', 'p-1', 'md:p-2');
      els.mainAppContainer.classList.add('fixed', 'inset-0', 'w-full', 'h-full', 'z-[100]', 'rounded-none', 'border-none');
      updateFullscreenButton();
    }

    function removeCssMaximize() {
      state.isCssMaximized = false;
      els.mainAppContainer.classList.remove('fixed', 'inset-0', 'w-full', 'h-full', 'z-[100]', 'rounded-none', 'border-none');
      els.mainAppContainer.classList.add('rounded-xl', 'border', 'border-slate-200', 'shadow-xl');
      updateFullscreenButton();
    }

    function updateFullscreenButton() {
      const btn = els.btnFullscreen;
      if (document.fullscreenElement || state.isCssMaximized) {
        btn.innerHTML = `<i data-lucide="minimize" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">退出全螢幕</span>`;
      } else {
        btn.innerHTML = `<i data-lucide="maximize" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">全螢幕</span>`;
      }
      lucide.createIcons({ root: btn });
    }

    function handleKeyDown(e) {
      if (e.key === 'Escape' && state.isCssMaximized) removeCssMaximize();
      if (e.key === 'Enter') {
        if (state.isStarted && CustomModal.el.classList.contains('hidden')) {
          if (state.mode === 'mode3' && state.drawIndex === 0) {
            e.preventDefault();
            drawAll();
          } else if (state.mode !== 'mode3' && state.drawIndex < state.drawStepTotal) {
            e.preventDefault();
            nextDraw();
          }
        }
      }
    }

    function redraw() {
      CustomModal.confirm("確定要重新抽籤嗎？\n\n這將會清除目前的抽籤紀錄，並以目前的設定重新洗牌！", () => {
        startDraw();
      });
    }

    function confirmReset() {
      CustomModal.confirm("確定要重新設定嗎？\n\n這將會清除所有載入的名單與目前的抽籤紀錄，並回到初始畫面！", () => {
        resetDraw(true);
      });
    }

    function adjustFontSize(delta) {
      state.fontSize = Math.max(12, Math.min(64, state.fontSize + delta));
      document.documentElement.style.setProperty('--name-size', state.fontSize + 'px');
    }

    function setMode(newMode) {
      state.mode = newMode;
      resetDraw(false);
      
      if (newMode === 'mode5') {
          els.room3Container.classList.remove('hidden');
          els.lowerCount.readOnly = false;
          els.lowerCount.classList.remove('bg-slate-50', 'text-slate-500', 'cursor-not-allowed');
          els.lowerCount.classList.add('focus:ring-2', 'focus:ring-indigo-500', 'focus:border-indigo-500');
          els.lblLowerCount.textContent = '1號教員室限額';
          els.lblUpperCount.textContent = '2號教員室限額';
          els.lblRoom3Count.textContent = '3號教員室限額';
      } else if (newMode === 'mode4') {
          els.room3Container.classList.add('hidden');
          els.lowerCount.readOnly = false;
          els.lowerCount.classList.remove('bg-slate-50', 'text-slate-500', 'cursor-not-allowed');
          els.lowerCount.classList.add('focus:ring-2', 'focus:ring-indigo-500', 'focus:border-indigo-500');
          els.lblLowerCount.textContent = '下層限額';
          els.lblUpperCount.textContent = '上層限額';
      } else {
          els.room3Container.classList.add('hidden');
          els.lowerCount.readOnly = true;
          els.lowerCount.classList.add('bg-slate-50', 'text-slate-500', 'cursor-not-allowed');
          els.lowerCount.classList.remove('focus:ring-2', 'focus:ring-indigo-500', 'focus:border-indigo-500');
          els.lblLowerCount.textContent = '下層人數 (自動)';
          els.lblUpperCount.textContent = '上層人數';
          calculateLowerCount();
      }
      renderUI();
    }

    function processRawNamesToGroups() {
      const combinedMap = {};
      
      state.rawNames.forEach((item, index) => {
        let groupKey = '';
        let isTicketGroup = false;
        let isDeptGroup = false;

        if (item.ticket !== '0' && item.ticket !== '1' && item.ticket !== '') {
          groupKey = `_ticket_${item.ticket}`;
          isTicketGroup = true;
        } else if (item.dept !== '0' && item.dept !== '') {
          groupKey = `_dept_${item.dept}`;
          isDeptGroup = true;
        } else {
          groupKey = `_indiv_${index}`;
        }

        if (!combinedMap[groupKey]) {
          let deptName = '0';
          if (isTicketGroup) {
            deptName = `連票 ${item.ticket}`;
          } else if (isDeptGroup) {
            deptName = item.dept;
          }

          combinedMap[groupKey] = {
            deptName: deptName,
            isGroup: false,
            isTicketGroup: isTicketGroup,
            isDeptGroup: isDeptGroup,
            count: 0,
            members: [],
            originalIndices: [],
            designatedLayerCode: null
          };
        }

        if (!combinedMap[groupKey].designatedLayerCode && item.designatedLayerCode && item.designatedLayerCode !== '0' && item.designatedLayerCode !== '') {
          combinedMap[groupKey].designatedLayerCode = item.designatedLayerCode;
        }

        combinedMap[groupKey].count++;
        combinedMap[groupKey].members.push({ 
          name: item.name, 
          dept: item.dept, 
          ticket: item.ticket, 
          originalIdx: index 
        });
        combinedMap[groupKey].originalIndices.push(index);
      });

      Object.values(combinedMap).forEach(g => {
        if (g.count > 1) {
          g.isGroup = true;
        }
      });

      state.groups = Object.values(combinedMap);
    }

    function handleLoadSheet() {
      let urlOrId = els.sheetUrlInput.value.trim();
      if (!urlOrId) {
        urlOrId = "1PY7x7IRhEdsxi8N63iBtSDPdwtdQ_WKSiA3SD1TfjSQ";
      }
      
      let sheetId = urlOrId;
      let gid = '0';
      
      const idMatch = urlOrId.match(/\/d\/([^/]+)/);
      if (idMatch) sheetId = idMatch[1];
      
      const gidMatch = urlOrId.match(/gid=([^&]+)/);
      if (gidMatch) gid = gidMatch[1];
      
      const oldScript = document.getElementById('jsonp-sheet-script');
      if (oldScript) oldScript.remove();
      
      const script = document.createElement('script');
      script.id = 'jsonp-sheet-script';
      script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:handleGoogleSheetJsonp&gid=${gid}`;
      
      script.onerror = function() {
        CustomModal.alert("雲端讀取失敗！\n1. 請檢查網路連線。\n2. 請確認試算表 ID 沒填錯。\n3. 請務必確認試算表已開啟「知道連結的任何人都可以檢視」權限。");
      };
      
      document.body.appendChild(script);
    }

    window.handleGoogleSheetJsonp = function(data) {
      if (!data || !data.table || !data.table.rows) {
        CustomModal.alert("無法解析 Google Sheet 回傳的資料結構。");
        return;
      }
      
      const rows = data.table.rows;
      state.rawNames = [];
      
      rows.forEach((row, idx) => {
        if (!row.c) return;
        
        const name = row.c[0] && row.c[0].v !== null ? String(row.c[0].v).trim() : `未知-${idx}`;
        const seats = row.c[1] && row.c[1].v !== null ? String(row.c[1].v).trim() : '0';
        const designatedLayerCode = row.c[2] && row.c[2].v !== null ? String(row.c[2].v).trim() : '0';
        const dept = row.c[3] && row.c[3].v !== null ? String(row.c[3].v).trim() : '0';
        
        if (idx === 0 && (name === '姓名' || name === 'name')) return;
        
        state.rawNames.push({ name, ticket: seats, dept, designatedLayerCode });
      });
      
      processRawNamesToGroups();
      state.fileName = 'Google Cloud 雲端試算表名單';
      
      resetDraw(false);
      calculateLowerCount();
      renderUI();
      CustomModal.alert(`🎉 雲端連動成功！\n共載入了 ${state.rawNames.length} 位人名資料。`);
    };

    function handleFileUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      state.fileName = file.name;
      const reader = new FileReader();
      reader.onload = (event) => {
        const text = event.target.result;
        const lines = text.split(/\r?\n/).map(n => n.trim()).filter(n => n.length > 0);
        
        state.rawNames = [];

        lines.forEach((line, idx) => {
            const parts = line.split(',');
            const name = parts[0] ? parts[0].trim() : `未知-${idx}`;
            const seats = parts[1] ? parts[1].trim() : '0';
            const designatedLayerCode = parts[2] ? parts[2].trim() : '0';
            const dept = parts[3] ? parts[3].trim() : '0';

            if (idx === 0 && (name === '姓名' || name === 'name')) return;

            state.rawNames.push({ name, ticket: seats, dept, designatedLayerCode });
        });
        
        processRawNamesToGroups();
        els.fileUpload.value = ''; 
        resetDraw(false);
        calculateLowerCount();
        renderUI();
      };
      reader.readAsText(file);
    }

    function handleUpperCountChange(e) {
      state.upperCount = e.target.value;
      calculateLowerCount();
    }

    function calculateLowerCount() {
      if (state.mode === 'mode4' || state.mode === 'mode5') return;
      
      if ((state.mode === 'split' || state.mode === 'mode3') && state.groups.length > 0) {
        const totalNeeded = state.groups.reduce((sum, g) => sum + g.count, 0);
        const up = parseInt(state.upperCount) || 0;
        const calculatedLower = Math.max(0, totalNeeded - up);
        state.lowerCount = calculatedLower.toString();
        els.lowerCount.value = state.lowerCount;
      }
    }

    function shuffleArray(array) {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    }

    function startDraw() {
      if (state.groups.length === 0) {
        CustomModal.alert("請先讀取雲端試算表或載入檔案名單！");
        return;
      }

      let upperRemaining = parseInt(state.upperCount) || 0;
      let lowerRemaining = parseInt(state.lowerCount) || 0;
      let room3Remaining = parseInt(state.room3Count) || 0;
      let requiredUpper = 0;
      let requiredLower = 0;
      let requiredRoom3 = 0;

      if (state.mode === 'split' || state.mode === 'mode3' || state.mode === 'mode4' || state.mode === 'mode5') {
        state.groups.forEach(g => {
            g.designatedLayer = null;
            if (g.designatedLayerCode === '1') g.designatedLayer = (state.mode === 'mode5') ? '1號房' : '下層';
            if (g.designatedLayerCode === '2') g.designatedLayer = (state.mode === 'mode5') ? '2號房' : '上層';
            if (g.designatedLayerCode === '3') g.designatedLayer = '3號房';

            if (g.designatedLayer === '上層' || g.designatedLayer === '2號房') requiredUpper += g.count;
            if (g.designatedLayer === '下層' || g.designatedLayer === '1號房') requiredLower += g.count;
            if (g.designatedLayer === '3號房') requiredRoom3 += g.count;
        });

        if (requiredUpper > upperRemaining) {
            const name = state.mode === 'mode5' ? '2號房' : '上層';
            CustomModal.alert(`⚠️ 座位衝突錯誤！\n\n強制指定派往「${name}」的人數共需 ${requiredUpper} 個座位，\n但目前該區總限額僅有 ${upperRemaining} 個。`);
            return;
        }
        if (requiredLower > lowerRemaining) {
            const name = state.mode === 'mode5' ? '1號房' : '下層';
            CustomModal.alert(`⚠️ 座位衝突錯誤！\n\n強制指定派往「${name}」的人數共需 ${requiredLower} 個座位，\n但目前該區總限額僅有 ${lowerRemaining} 個。`);
            return;
        }
        if (state.mode === 'mode5' && requiredRoom3 > room3Remaining) {
            CustomModal.alert(`⚠️ 座位衝突錯誤！\n\n強制指定派往「3號房」的人數共需 ${requiredRoom3} 個座位，\n但目前該房總限額僅有 ${room3Remaining} 個。`);
            return;
        }
      }

      if (state.mode === 'mode4' || state.mode === 'mode5') {
        const totalNeeded = state.groups.reduce((sum, g) => sum + g.count, 0);
        const totalAvailable = upperRemaining + lowerRemaining + (state.mode === 'mode5' ? room3Remaining : 0);
        if (totalAvailable < totalNeeded) {
            CustomModal.alert(`⚠️ 座位總數不足！\n\n名單共需 ${totalNeeded} 個座位，但目前各房總限額僅 ${totalAvailable} 個。`);
            return;
        }
      }

      let freeUpperRemaining = upperRemaining - requiredUpper;
      let freeLowerRemaining = lowerRemaining - requiredLower;
      let freeRoom3Remaining = room3Remaining - requiredRoom3;
      
      let maxAttempts = 300;
      let successfulAllocation = false;
      let randomizedGroups = [];

      for (let attempt = 0; attempt < maxAttempts; attempt++) {
          let tempUpper = freeUpperRemaining;
          let tempLower = freeLowerRemaining;
          let tempRoom3 = freeRoom3Remaining;
          let isSuccess = true;
          
          randomizedGroups = shuffleArray(state.groups);
          
          for (let group of randomizedGroups) {
              let assignedLayer = null;

              if (state.mode === 'split' || state.mode === 'mode3' || state.mode === 'mode4' || state.mode === 'mode5') {
                  if (group.designatedLayer) {
                      assignedLayer = group.designatedLayer;
                  } else {
                      let canUpper = tempUpper >= group.count;
                      let canLower = tempLower >= group.count;
                      let canRoom3 = state.mode === 'mode5' && tempRoom3 >= group.count;

                      if (state.mode === 'split' || state.mode === 'mode3') {
                          if (canUpper) {
                              assignedLayer = '上層';
                              tempUpper -= group.count;
                          } else if (canLower) {
                              assignedLayer = '下層';
                              tempLower -= group.count;
                          } else {
                              isSuccess = false; break; 
                          }
                      } else if (state.mode === 'mode4') {
                          if (canUpper && canLower) {
                              assignedLayer = Math.random() < 0.5 ? '上層' : '下層';
                              if (assignedLayer === '上層') tempUpper -= group.count;
                              else tempLower -= group.count;
                          } else if (canUpper) {
                              assignedLayer = '上層';
                              tempUpper -= group.count;
                          } else if (canLower) {
                              assignedLayer = '下層';
                              tempLower -= group.count;
                          } else {
                              isSuccess = false; break; 
                          }
                      } else if (state.mode === 'mode5') {
                          let validRooms = [];
                          if (canLower) validRooms.push('1號房');
                          if (canUpper) validRooms.push('2號房');
                          if (canRoom3) validRooms.push('3號房');

                          if (validRooms.length > 0) {
                              assignedLayer = validRooms[Math.floor(Math.random() * validRooms.length)];
                              if (assignedLayer === '1號房') tempLower -= group.count;
                              else if (assignedLayer === '2號房') tempUpper -= group.count;
                              else if (assignedLayer === '3號房') tempRoom3 -= group.count;
                          } else {
                              isSuccess = false; break;
                          }
                      }
                  }
              }
              group.tempAssignedLayer = assignedLayer;
          }

          if (isSuccess) {
              successfulAllocation = true;
              break;
          }
      }

      if (!successfulAllocation) {
          CustomModal.alert(`⚠️ 空間分配失敗（裝箱衝突）！\n\n系統嘗試了 ${maxAttempts} 次組合，但由於「科」或「連票」的人數區塊過大，無法完美塞入零碎空間。\n\n💡 建議調整各區塊限額或將大型區塊打散。`);
          return;
      }

      let finalizedIndividuals = [];
      let globalId = 1;
      let upperId = 1;
      let lowerId = 1;
      let room3Id = 1;
      let currentGroupIdx = 0;

      randomizedGroups.forEach((group) => {
          group.assignedLayer = group.tempAssignedLayer;

          let groupStyleObj = null;
          if (group.isGroup) {
              let baseHue = (currentGroupIdx * 106.95) % 280;
              let hue = baseHue >= 170 ? baseHue + 80 : baseHue;
              groupStyleObj = {
                  text: `hsl(${Math.floor(hue)}, 90%, 40%)` 
              };
              currentGroupIdx++;
          }
          group.groupStyle = groupStyleObj;
      });

      const isSeparateDraw = els.chkSeparateDraw.checked && state.mode !== 'all';

      if (isSeparateDraw) {
          let flatEntities = [];
          randomizedGroups.forEach((group) => {
              if (group.isTicketGroup) {
                  flatEntities.push({ 
                    isTicketBlock: true, 
                    group: group, 
                    designatedLayer: group.designatedLayer,
                    designatedLayerCode: group.designatedLayerCode
                  });
              } else {
                  group.members.forEach((member) => {
                      flatEntities.push({
                          isTicketBlock: false,
                          name: member.name,
                          dept: member.dept,
                          layer: group.assignedLayer,
                          originalIdx: member.originalIdx,
                          isGroup: group.isGroup,
                          groupStyle: group.groupStyle,
                          designatedLayer: group.designatedLayer,
                          designatedLayerCode: group.designatedLayerCode
                      });
                  });
              }
          });

          let shuffledEntities = shuffleArray(flatEntities);

          shuffledEntities.forEach((entity, idx) => {
              if (entity.isTicketBlock) {
                  const g = entity.group;
                  g.members.forEach((member) => {
                      let lOrder = null;
                      if (g.assignedLayer === '上層' || g.assignedLayer === '2號房') lOrder = upperId++;
                      else if (g.assignedLayer === '下層' || g.assignedLayer === '1號房') lOrder = lowerId++;
                      else if (g.assignedLayer === '3號房') lOrder = room3Id++;

                      finalizedIndividuals.push({
                          groupId: idx,
                          id: globalId++,
                          name: member.name,
                          dept: member.dept !== '0' ? `${member.dept} (連票 ${member.ticket})` : `連票 ${member.ticket}`,
                          layer: g.assignedLayer,
                          layerOrder: lOrder,
                          originalIdx: member.originalIdx,
                          isGroup: true,
                          groupStyle: g.groupStyle,
                          designatedLayer: g.designatedLayer,
                          designatedLayerCode: g.designatedLayerCode
                      });
                  });
              } else {
                  let lOrder = null;
                  if (entity.layer === '上層' || entity.layer === '2號房') lOrder = upperId++;
                  else if (entity.layer === '下層' || entity.layer === '1號房') lOrder = lowerId++;
                  else if (entity.layer === '3號房') lOrder = room3Id++;

                  finalizedIndividuals.push({
                      groupId: idx,
                      id: globalId++,
                      name: entity.name,
                      dept: entity.dept,
                      layer: entity.layer,
                      layerOrder: lOrder,
                      originalIdx: entity.originalIdx,
                      isGroup: entity.isGroup,
                      groupStyle: entity.groupStyle,
                      designatedLayer: entity.designatedLayer,
                      designatedLayerCode: entity.designatedLayerCode
                  });
              }
          });
          state.drawStepTotal = shuffledEntities.length;

      } else {
          randomizedGroups.forEach((group, groupDrawOrder) => {
              group.members.forEach((member) => {
                  let displayDept = member.dept;
                  if (group.isTicketGroup) {
                      displayDept = member.dept !== '0' ? `${member.dept} (連票 ${member.ticket})` : `連票 ${member.ticket}`;
                  }
                  let lOrder = null;
                  if (group.assignedLayer === '上層' || group.assignedLayer === '2號房') lOrder = upperId++;
                  else if (group.assignedLayer === '下層' || group.assignedLayer === '1號房') lOrder = lowerId++;
                  else if (group.assignedLayer === '3號房') lOrder = room3Id++;

                  finalizedIndividuals.push({
                      groupId: groupDrawOrder,
                      id: globalId++,
                      name: member.name,
                      dept: displayDept,
                      layer: group.assignedLayer,
                      layerOrder: lOrder,
                      originalIdx: member.originalIdx,
                      isGroup: group.isGroup,
                      groupStyle: group.groupStyle,
                      designatedLayer: group.designatedLayer,
                      designatedLayerCode: group.designatedLayerCode
                  });
              });
          });
          state.drawStepTotal = randomizedGroups.length;
      }

      state.drawList = finalizedIndividuals;
      state.drawIndex = 0; 
      state.isStarted = true;
      renderUI();
    }

    function nextDraw() {
      if (state.drawIndex < state.drawStepTotal) {
        state.drawIndex++;
        renderDrawingUI();
      }
    }

    function drawAll() {
      state.drawIndex = state.drawStepTotal;
      renderDrawingUI();
    }

    function resetDraw(clearFile = false) {
      state.isStarted = false;
      state.drawList = [];
      state.drawIndex = 0;
      if (clearFile) {
        state.rawNames = [];
        state.groups = [];
        state.fileName = '';
        els.sheetUrlInput.value = '';
        els.upperCount.value = '';
        els.lowerCount.value = '';
        els.room3Count.value = '';
        state.upperCount = '';
        state.lowerCount = '';
        state.room3Count = '';
      }
      renderUI();
    }

    function renderUI() {
      els.modeBtns.forEach(btn => {
        if (btn.dataset.mode === state.mode) {
          btn.className = "mode-btn flex-1 py-2.5 px-2 rounded-lg flex items-center justify-center gap-2 text-sm font-bold transition-all bg-indigo-50 text-indigo-600 shadow-sm border border-indigo-100 min-w-[120px]";
        } else {
          btn.className = "mode-btn flex-1 py-2.5 px-2 rounded-lg flex items-center justify-center gap-2 text-sm font-medium transition-all text-slate-500 hover:text-slate-700 hover:bg-slate-50 border border-transparent min-w-[120px]";
        }
      });

      if (state.isStarted) {
        els.sectionSettings.classList.add('hidden');
        els.sectionDrawing.classList.remove('hidden');
        els.sectionDrawing.style.display = 'flex';
        els.btnReset.classList.remove('hidden');
        els.btnReset.style.display = 'flex';
        els.btnRedraw.classList.remove('hidden');
        els.btnRedraw.style.display = 'flex';
        els.headerSubtitle.classList.add('hidden');
        renderDrawingUI();
      } else {
        els.sectionSettings.classList.remove('hidden');
        els.sectionDrawing.classList.add('hidden');
        els.sectionDrawing.style.display = 'none';
        els.btnReset.classList.add('hidden');
        els.btnReset.style.display = 'none';
        els.btnRedraw.classList.add('hidden');
        els.btnRedraw.style.display = 'none';
        els.headerSubtitle.classList.remove('hidden');

        if (state.fileName) {
          const deptCount = state.groups.filter(g => g.isDeptGroup && g.isGroup).length;
          const ticketCount = state.groups.filter(g => g.isTicketGroup).length;
          const totalNeeded = state.groups.reduce((sum, g) => sum + g.count, 0);
          els.fileNameDisplay.textContent = `已載入名單：${state.fileName} (共 ${totalNeeded} 人，內含 ${deptCount} 個科別，${ticketCount} 組連票綑綁)`;
          els.fileNameDisplay.classList.remove('hidden');
          els.btnStart.disabled = false;
        } else {
          els.fileNameDisplay.classList.add('hidden');
          els.btnStart.disabled = true;
        }

        if (state.mode === 'split' || state.mode === 'mode3' || state.mode === 'mode4' || state.mode === 'mode5') {
          els.layerSettings.classList.remove('hidden');
          if (state.mode !== 'mode4' && state.mode !== 'mode5') {
              const totalNeeded = state.groups.reduce((sum, g) => sum + g.count, 0);
              els.upperCount.max = totalNeeded;
          } else {
              els.upperCount.removeAttribute('max');
          }
        } else {
          els.layerSettings.classList.add('hidden');
        }

        if (state.mode === 'split' || state.mode === 'mode3' || state.mode === 'mode4' || state.mode === 'mode5') {
          els.chkContainer.classList.remove('hidden');
        } else {
          els.chkContainer.classList.add('hidden');
        }

        els.startBtnText.textContent = state.mode === 'mode3' ? '進入分配畫面' : '開始抽籤';
      }
      lucide.createIcons();
    }

    function renderDrawingUI() {
      // 在此計算實際上已被抽出的參與人數與總人數 (以座位數目為準)
      const visibleList = state.mode === 'mode3' 
            ? state.drawList 
            : state.drawList.filter(item => item.groupId < state.drawIndex);

      els.drawIndexDisplay.textContent = visibleList.length;
      els.drawTotalDisplay.textContent = state.drawList.length; 
      els.pdfHeader.textContent = state.mode === 'mode3' ? '列表分配結果' : '抽籤結果報告';

      els.drawProgressLabel.textContent = '座位數目';

      if (state.mode === 'split' || state.mode === 'mode4' || state.mode === 'mode5') {
        els.layerBalances.classList.remove('hidden');
        els.layerBalances.classList.add('flex');
        
        let upperUsed = 0;
        let lowerUsed = 0;
        let room3Used = 0;
        
        visibleList.forEach(i => {
            if (i.layer === '上層' || i.layer === '2號房') upperUsed++;
            if (i.layer === '下層' || i.layer === '1號房') lowerUsed++;
            if (i.layer === '3號房') room3Used++;
        });
        
        const uTotal = parseInt(state.upperCount) || 0;
        const lTotal = parseInt(state.lowerCount) || 0;
        const r3Total = parseInt(state.room3Count) || 0;
        
        if (state.mode === 'mode5') {
            els.layerBalances.innerHTML = `
                <span class="bg-emerald-50 text-emerald-700 px-2 py-1 rounded-md border border-emerald-200 text-xs shadow-sm font-bold tracking-wide">1號房餘額: <span class="text-emerald-900">${lTotal - lowerUsed}</span></span>
                <span class="bg-amber-50 text-amber-700 px-2 py-1 rounded-md border border-amber-200 text-xs shadow-sm font-bold tracking-wide">2號房餘額: <span class="text-amber-900">${uTotal - upperUsed}</span></span>
                <span class="bg-purple-50 text-purple-700 px-2 py-1 rounded-md border border-purple-200 text-xs shadow-sm font-bold tracking-wide">3號房餘額: <span class="text-purple-900">${r3Total - room3Used}</span></span>
            `;
        } else {
            els.layerBalances.innerHTML = `
                <span class="bg-indigo-50 text-indigo-700 px-2 py-1 rounded-md border border-indigo-200 text-xs shadow-sm font-bold tracking-wide">下層餘額: <span class="text-indigo-900">${lTotal - lowerUsed}</span></span>
                <span class="bg-amber-50 text-amber-700 px-2 py-1 rounded-md border border-amber-200 text-xs shadow-sm font-bold tracking-wide">上層餘額: <span class="text-amber-900">${uTotal - upperUsed}</span></span>
            `;
        }
      } else {
        els.layerBalances.classList.add('hidden');
        els.layerBalances.classList.remove('flex');
      }

      if (state.mode === 'mode3') {
        els.drawProgress.classList.add('hidden');
        if (state.drawIndex === 0) {
          els.drawActionArea.innerHTML = `
            <button onclick="drawAll()" class="group px-6 py-1.5 bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-lg font-bold text-sm shadow-md hover:shadow-lg active:scale-95 transition-all flex items-center gap-1.5">
              <i data-lucide="play" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
              開始分配 (Enter)
            </button>
          `;
        } else {
          els.drawActionArea.innerHTML = `
            <div class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-md font-bold text-sm flex items-center gap-1 border border-emerald-200">
              <i data-lucide="check-circle-2" class="w-4 h-4"></i> 分配完成
            </div>
          `;
        }
      } else {
        els.drawProgress.classList.remove('hidden');
        if (state.drawIndex < state.drawStepTotal) {
          els.drawActionArea.innerHTML = `
            <button onclick="nextDraw()" class="group px-4 py-1.5 bg-gradient-to-r from-indigo-600 to-blue-600 text-white rounded-lg font-bold text-sm shadow-md hover:shadow-lg active:scale-95 transition-all flex items-center gap-1.5">
              <i data-lucide="pointer" class="w-4 h-4 group-hover:-translate-y-0.5 transition-transform"></i>
              第 ${state.drawIndex + 1} 次抽籤 (Enter)
            </button>
            <button onclick="drawAll()" class="px-3 py-1.5 bg-slate-100 text-slate-700 border border-slate-200 rounded-lg font-bold text-xs hover:bg-slate-200 active:scale-95 transition-all flex items-center gap-1">
              <i data-lucide="users-2" class="w-3.5 h-3.5"></i> 直接抽出全部
            </button>
          `;
        } else {
          els.drawActionArea.innerHTML = `
            <div class="px-3 py-1.5 bg-emerald-100 text-emerald-700 rounded-lg font-bold text-sm flex items-center gap-1.5 border border-emerald-200">
              <i data-lucide="check-circle-2" class="w-4 h-4"></i> 抽籤已完成
            </div>
          `;
        }
      }

      if (state.mode === 'mode3' || state.drawIndex > 0) {
        let contentHTML = '';
        const showDesignated = els.chkShowDesignated.checked;

        if (state.mode === 'mode3') {
          const isRevealed = state.drawIndex > 0;
          const sortedList = [...visibleList].sort((a, b) => a.originalIdx - b.originalIdx);
          contentHTML = `<div class="grid grid-cols-[repeat(auto-fill,minmax(140px,1fr))] gap-2">`;
          sortedList.forEach(item => {
            const isUp = item.layer === '上層' || item.layer === '2號房';
            const badgeClass = isUp ? 'bg-amber-100 text-amber-800 border-amber-200' : 'bg-indigo-100 text-indigo-800 border-indigo-200';
            const boxClass = 'bg-white border-slate-200 border relative';
            const deptColor = item.groupStyle ? item.groupStyle.text : '#94a3b8';

            contentHTML += `
              <div class="flex flex-col items-center justify-center rounded-lg p-2 shadow-sm min-h-[64px] animate-zoom-in ${boxClass}">
                <span class="absolute top-1 left-1.5 text-slate-400 text-xs font-mono">${item.originalIdx + 1}</span>
                <span class="font-bold text-slate-800 truncate w-full text-center px-1 mb-0.5 flex flex-col justify-center" style="line-height: 1.2;">
                  <span style="font-size: var(--name-size);">${item.name}</span>
                  ${showDesignated && (item.isGroup || item.dept !== '0') ? `<span class="text-[8px] font-bold truncate mt-0.5" style="color: ${deptColor}">${item.dept === '0' ? '' : item.dept}</span>` : ''}
                </span>
                ${isRevealed ? `
                <span class="${badgeClass} border text-xs font-bold px-1.5 py-0.5 rounded-sm leading-none mt-0.5 animate-fade-in">
                  ${item.layer} ${item.layerOrder}
                </span>
                ` : `
                <span class="border text-xs font-bold px-1.5 py-0.5 rounded-sm leading-none mt-0.5 opacity-0">隱藏</span>
                `}
                ${showDesignated && item.designatedLayerCode ? `<span class="absolute bottom-1 right-1.5 text-[10px] text-slate-400 font-medium bg-slate-50 px-1 py-0.5 rounded border border-slate-100 shadow-sm" title="強制指定">📌${item.designatedLayerCode}</span>` : ''}
              </div>
            `;
          });
          contentHTML += `</div>`;
        } 
        else if (state.mode === 'split' || state.mode === 'mode4' || state.mode === 'mode5') {
          const upperList = visibleList.filter(i => i.layer === '上層' || i.layer === '2號房');
          const lowerList = visibleList.filter(i => i.layer === '下層' || i.layer === '1號房');
          const room3List = visibleList.filter(i => i.layer === '3號房');
          
          const buildTags = (list) => {
            let tags = '<div class="grid grid-cols-[repeat(auto-fill,minmax(120px,1fr))] gap-2">';
            list.forEach(item => {
              const boxClass = 'bg-white border-slate-200 border relative';
              const numClass = 'text-slate-600 bg-slate-100 font-bold';
              const deptColor = item.groupStyle ? item.groupStyle.text : '#94a3b8';

              tags += `
                <div class="flex items-center rounded p-1.5 shadow-sm animate-zoom-in min-h-[44px] ${boxClass}">
                  <span class="font-mono ${numClass} w-6 h-6 flex items-center justify-center rounded text-sm shrink-0">
                    ${item.layerOrder}
                  </span>
                  <span class="font-bold text-slate-800 ml-2 pr-8 truncate w-full text-left flex flex-col justify-center" style="line-height: 1.2;">
                    <span style="font-size: var(--name-size);">${item.name}</span>
                    ${showDesignated && (item.isGroup || item.dept !== '0') ? `<span class="text-[8px] font-bold truncate mt-0.5" style="color: ${deptColor}">${item.dept === '0' ? '' : item.dept}</span>` : ''}
                  </span>
                  ${showDesignated && item.designatedLayerCode ? `<span class="absolute bottom-1 right-1.5 text-[10px] text-slate-400 font-medium bg-slate-50 px-1 py-0.5 rounded border border-slate-100 shadow-sm" title="強制指定">📌${item.designatedLayerCode}</span>` : ''}
                </div>
              `;
            });
            tags += '</div>';
            return tags;
          };

          const layoutClass = state.layoutMode === 'horizontal' 
            ? (state.mode === 'mode5' ? 'grid grid-cols-1 md:grid-cols-3 gap-3 h-full' : 'grid grid-cols-1 md:grid-cols-2 gap-3 h-full')
            : 'flex flex-col gap-3 h-full';

          if (state.mode === 'mode5') {
              contentHTML = `
                <div class="${layoutClass}">
                  <div class="flex-1 min-h-0 bg-white border border-slate-200 rounded-lg p-2 md:p-3 shadow-sm flex flex-col">
                    <div class="text-sm font-bold text-emerald-700 mb-2 border-b border-emerald-100 pb-1 flex items-center gap-1 shrink-0">
                      <i data-lucide="home" class="w-4 h-4"></i> 1號教員室 (${lowerList.length} 人)
                    </div>
                    <div class="overflow-y-auto pr-1 flex-1">
                      ${buildTags(lowerList)}
                    </div>
                  </div>

                  <div class="flex-1 min-h-0 bg-white border border-slate-200 rounded-lg p-2 md:p-3 shadow-sm flex flex-col">
                    <div class="text-sm font-bold text-amber-700 mb-2 border-b border-amber-100 pb-1 flex items-center gap-1 shrink-0">
                      <i data-lucide="home" class="w-4 h-4"></i> 2號教員室 (${upperList.length} 人)
                    </div>
                    <div class="overflow-y-auto pr-1 flex-1">
                      ${buildTags(upperList)}
                    </div>
                  </div>

                  <div class="flex-1 min-h-0 bg-white border border-slate-200 rounded-lg p-2 md:p-3 shadow-sm flex flex-col">
                    <div class="text-sm font-bold text-purple-700 mb-2 border-b border-purple-100 pb-1 flex items-center gap-1 shrink-0">
                      <i data-lucide="home" class="w-4 h-4"></i> 3號教員室 (${room3List.length} 人)
                    </div>
                    <div class="overflow-y-auto pr-1 flex-1">
                      ${buildTags(room3List)}
                    </div>
                  </div>
                </div>
              `;
          } else {
              contentHTML = `
                <div class="${layoutClass}">
                  <div class="flex-1 min-h-0 bg-white border border-slate-200 rounded-lg p-2 md:p-3 shadow-sm flex flex-col">
                    <div class="text-sm font-bold text-indigo-700 mb-2 border-b border-indigo-100 pb-1 flex items-center gap-1 shrink-0">
                      <i data-lucide="layers" class="w-4 h-4"></i> 下層名單 (${lowerList.length} 人)
                    </div>
                    <div class="overflow-y-auto pr-1 flex-1">
                      ${buildTags(lowerList)}
                    </div>
                  </div>

                  <div class="flex-1 min-h-0 bg-white border border-slate-200 rounded-lg p-2 md:p-3 shadow-sm flex flex-col">
                    <div class="text-sm font-bold text-amber-700 mb-2 border-b border-amber-100 pb-1 flex items-center gap-1 shrink-0">
                      <i data-lucide="layers" class="w-4 h-4"></i> 上層名單 (${upperList.length} 人)
                    </div>
                    <div class="overflow-y-auto pr-1 flex-1">
                      ${buildTags(upperList)}
                    </div>
                  </div>
                </div>
              `;
          }
        } 
        else {
          contentHTML = `<div class="grid grid-cols-[repeat(auto-fill,minmax(120px,1fr))] gap-2">`;
          visibleList.forEach(item => {
            const boxClass = 'bg-white border-slate-200 border relative';
            const numClass = 'text-slate-600 bg-slate-100 font-bold';
            const deptColor = item.groupStyle ? item.groupStyle.text : '#94a3b8';

            contentHTML += `
              <div class="flex items-center rounded p-1.5 shadow-sm animate-zoom-in min-h-[44px] ${boxClass}">
                <span class="font-mono ${numClass} w-6 h-6 flex items-center justify-center rounded text-sm shrink-0">
                  ${item.id}
                </span>
                <span class="font-bold text-slate-800 ml-2 pr-8 truncate w-full text-left flex flex-col justify-center" style="line-height: 1.2;">
                  <span style="font-size: var(--name-size);">${item.name}</span>
                  ${showDesignated && (item.isGroup || item.dept !== '0') ? `<span class="text-[8px] font-bold truncate mt-0.5" style="color: ${deptColor}">${item.dept === '0' ? '' : item.dept}</span>` : ''}
                </span>
                ${showDesignated && item.designatedLayerCode ? `<span class="absolute bottom-1 right-1.5 text-[10px] text-slate-400 font-medium bg-slate-50 px-1 py-0.5 rounded border border-slate-100 shadow-sm" title="強制指定">📌${item.designatedLayerCode}</span>` : ''}
              </div>
            `;
          });
          contentHTML += `</div>`;
        }

        els.resultsContent.innerHTML = contentHTML;
      } else {
        els.resultsContent.innerHTML = '';
      }
      lucide.createIcons();
    }

    // --- Export Functions ---

    function exportXLSX() {
      if (typeof window.XLSX === 'undefined') {
        CustomModal.alert("Excel 導出套件仍在載入中，請稍後再試。");
        return;
      }

      if (state.drawIndex === 0) {
        CustomModal.alert("請先執行抽籤或分配，再匯出結果！");
        return;
      }
      
      let exportData = [];
      const visibleList = state.drawList.filter(item => item.groupId < state.drawIndex);
      
      if (state.mode === 'split' || state.mode === 'mode4' || state.mode === 'mode5') {
        const upperList = visibleList.filter(i => i.layer === '上層' || i.layer === '2號房');
        const lowerList = visibleList.filter(i => i.layer === '下層' || i.layer === '1號房');
        const room3List = visibleList.filter(i => i.layer === '3號房');
        const maxLen = Math.max(upperList.length, lowerList.length, room3List.length);
        
        for (let i = 0; i < maxLen; i++) {
          if (state.mode === 'mode5') {
              exportData.push({
                '1號房順序': lowerList[i]?.layerOrder || '',
                '1號房姓名': lowerList[i]?.name || '',
                '1號房備註(科別/連位)': lowerList[i]?.dept === '0' ? '無' : (lowerList[i]?.dept || ''),
                '2號房順序': upperList[i]?.layerOrder || '',
                '2號房姓名': upperList[i]?.name || '',
                '2號房備註(科別/連位)': upperList[i]?.dept === '0' ? '無' : (upperList[i]?.dept || ''),
                '3號房順序': room3List[i]?.layerOrder || '',
                '3號房姓名': room3List[i]?.name || '',
                '3號房備註(科別/連位)': room3List[i]?.dept === '0' ? '無' : (room3List[i]?.dept || '')
              });
          } else {
              exportData.push({
                '下層順序': lowerList[i]?.layerOrder || '',
                '下層姓名': lowerList[i]?.name || '',
                '下層備註(科別/連位)': lowerList[i]?.dept === '0' ? '無' : (lowerList[i]?.dept || ''),
                '上層順序': upperList[i]?.layerOrder || '',
                '上層姓名': upperList[i]?.name || '',
                '上層備註(科別/連位)': upperList[i]?.dept === '0' ? '無' : (upperList[i]?.dept || '')
              });
          }
        }
      } else {
        exportData = visibleList.map(item => {
          const row = { '全域順序': item.id };
          if (state.mode === 'mode3') {
            row['層級/房間'] = item.layer;
            row['層級順序'] = item.layerOrder;
          }
          row['姓名'] = item.name;
          row['備註(科別/連位)'] = item.dept === '0' ? '無' : item.dept;
          return row;
        });
      }

      const worksheet = window.XLSX.utils.json_to_sheet(exportData);
      const workbook = window.XLSX.utils.book_new();
      window.XLSX.utils.book_append_sheet(workbook, worksheet, "抽籤結果");
      window.XLSX.writeFile(workbook, "抽籤結果.xlsx");
    }

    function exportPDF() {
      if (typeof window.html2pdf === 'undefined') {
        CustomModal.alert("PDF 導出套件仍在載入中，請稍後再試。");
        return;
      }

      if (state.drawIndex === 0) {
        CustomModal.alert("請先執行抽籤或分配，再匯出結果！");
        return;
      }
      
      const element = els.pdfContainer;
      const opt = {
        margin: 0.5,
        filename: '抽籤結果.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
      };
      window.html2pdf().set(opt).from(element).save();
    }

  </script>
</body>
</html>
